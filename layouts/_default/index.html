{{ define "main" }}
<section>
    {{ .Content }}
    <br/>
    {{ $paginator := .Paginate (where .Site.RegularPages "Section" "posts") }}
    {{ range $paginator.Pages }}
    <article>
        <header>
            <a href="{{ .Permalink }}"><h2>{{ .Title }}</h2></a>
            <time datetime="{{ .Date.Format "2006-01-02" }}" class="meta">{{ .Date.Format "January 02, 2006" }}</time>
        </header>
        <p>{{ .Summary }}</p>
	<p><a href="{{ .Permalink }}"><b>Read more...</b></a></p>
    </article>
    {{ end }}

    {{ partial "pagination.html" . }}
</section>
{{ end }}
